[global]
# 系统运行模式，可选值："production"（生产环境）、"development"（开发环境）
mode = production

[server]
# 后端服务对外暴露协议，可选："http"、"https"、"socket"
protocol = http

# 监听的 IP 地址，"0.0.0.0" 表示监听所有网卡地址
http_addr = 0.0.0.0

# HTTP 服务监听端口
http_port = 8081

# 访问 ezBookkeeping 时使用的域名
domain = localhost

# 浏览器访问 ezBookkeeping 的完整根地址，支持占位符 %(protocol)s、%(domain)s、%(http_port)s
root_url = %(protocol)s://%(domain)s:%(http_port)s/

# HTTPS 证书文件路径
cert_file =
# HTTPS 证书密钥文件路径
cert_key_file =

# Unix Socket 路径，仅当 protocol 为 "socket" 时生效
unix_socket =

# 静态资源根目录（相对或绝对路径）
static_root_path = public

# 是否启用 GZip 压缩
enable_gzip = false

# 是否记录每个请求及其执行时间
log_request = true

# 是否在响应中添加 X-Request-Id 头部，用于跟踪请求或错误，默认 true
request_id_header = true

[mcp]
# 是否启用 MCP（Model Context Protocol）服务（通过 http / https 暴露给 AI/LLM 使用）
enable_mcp = false

# MCP 服务允许访问的远程 IP 列表，使用逗号分隔，支持通配符 *（例如 192.168.1.* 表示 192.168.1.x 网段），留空则允许所有 IP
mcp_allowed_remote_ips =

[database]
# 数据库类型，可选："mysql"、"postgres"、"sqlite3"
type = sqlite3

# MySQL / PostgreSQL 数据库连接配置
host = 127.0.0.1:3306
name = ezbookkeeping
user = root
passwd =

# 仅 PostgreSQL 使用的 SSL 模式，可选："disable"、"require"、"verify-full"
ssl_mode = disable

# 仅 SQLite3 使用的数据库文件路径（相对或绝对）
db_path = data/ezbookkeeping.db

# 最大空闲连接数 (0 - 65535，0 表示不保留空闲连接)，默认 2
max_idle_conn = 2

# 最大打开连接数 (0 - 65535，0 表示不限制)
max_open_conn = 0

# 连接最大生命周期（秒，0 - 4294967295），默认 14400（4 小时）
conn_max_lifetime = 14400

# 是否记录每条 SQL 语句及其执行时间
log_query = false

# 是否在启动 Web 服务时自动更新数据库结构
auto_update_database = true

[mail]
# 是否启用 SMTP 邮件发送功能（找回密码、验证邮件等都依赖该配置）
enable_smtp = false

# SMTP 服务器连接配置（地址:端口）
smtp_host = 127.0.0.1:25
smtp_user =
smtp_passwd =
# 是否跳过 SMTP TLS 证书校验
smtp_skip_tls_verify = false

# 发件人地址，可以是邮箱地址，或 "名称" <user@domain.com> 的格式
from_address =

[log]
# 日志输出方式，可为 "console"（控制台）、"file"（文件），可空格分隔配置多个，例如 "console file"
mode = console file

# 日志级别，可选："debug"、"info"、"warn"、"error"，默认 "info"
level = info

# 仅当包含 "file" 日志模式时生效，日志文件路径（相对或绝对）
log_path = log/ezbookkeeping.log

# 仅当包含 "file" 日志模式时生效，请求日志文件路径（留空则写入默认日志文件）
request_log_path =

# 仅当包含 "file" 日志模式时生效，SQL 查询日志文件路径（留空则写入默认日志文件）
query_log_path =

# 仅当包含 "file" 日志模式时生效，是否对日志文件进行滚动切割
log_file_rotate = false

# 仅当包含 "file" 日志模式时生效，单个日志文件的最大大小（字节，1 - 4294967295），超过后进行切割
log_file_max_size = 104857600

# 仅当包含 "file" 日志模式时生效，保留日志文件的最大天数，0 表示保留所有历史日志
log_file_max_days = 7

[storage]
# 对象存储类型，目前支持："local_filesystem"（本地文件系统）、"minio"、"webdav"
type = local_filesystem

# 仅当 type 为 "local_filesystem" 时使用，本地存储根路径（相对或绝对）
local_filesystem_path = storage/

# 仅当 type 为 "minio" 时使用，MinIO 连接配置
minio_endpoint = 127.0.0.1:9000
minio_location =
minio_access_key_id =
minio_secret_access_key =

# 仅当 type 为 "minio" 时使用，是否启用 SSL
minio_use_ssl = false

# 仅当 type 为 "minio" 时使用，是否跳过 TLS 证书校验
minio_skip_tls_verify = false

# 仅当 type 为 "minio" 时使用，MinIO 的 Bucket 名称
minio_bucket = ezbookkeeping

# 仅当 type 为 "minio" 时使用，存储文件时使用的根路径
minio_root_path = /

# 仅当 type 为 "webdav" 时使用，WebDAV 服务地址
webdav_url =

# 仅当 type 为 "webdav" 时使用，WebDAV 用户名
webdav_username =

# 仅当 type 为 "webdav" 时使用，WebDAV 密码
webdav_password =

# 仅当 type 为 "webdav" 时使用，在 WebDAV 中保存文件的根路径
webdav_root_path = /

# 仅当 type 为 "webdav" 时使用，请求 WebDAV 服务的超时时间（毫秒，0 - 4294967295），0 表示不限时，默认 10000（10 秒）
webdav_request_timeout = 10000

# 仅当 type 为 "webdav" 时使用，请求 WebDAV 时使用的代理，支持：
# "system"（使用系统代理）、"none"（不使用代理）、或以 "http://"/"https://"/"socks5://" 开头的代理地址
webdav_proxy = system

# 仅当 type 为 "webdav" 时使用，是否跳过 TLS 证书校验
webdav_skip_tls_verify = false

[llm]
# 是否启用“根据 AI 图像识别结果创建交易”的功能
# 启用后需在 [llm_image_recognition] 中正确配置 llm_provider 及其相关模型
transaction_from_ai_image_recognition = false

# 是否启用基于 OCR（tesseract）的账单/截图识别创建交易
# 需要系统安装 tesseract-ocr 和 tesseract-ocr-chi-sim（例如 apt install tesseract-ocr tesseract-ocr-chi-sim）
transaction_from_ocr_image_recognition = false

# AI 识别图片的最大允许大小（字节，1 - 4294967295）
max_ai_recognition_picture_size = 10485760

# （可选）外部 PaddleOCR HTTP 接口地址，用于账单 / 交易列表截图识别
# 要求接口接收 multipart/form-data 的 "image" 字段，并返回至少包含 { "success": true, "text": "..." } 的 JSON
# 示例：http://127.0.0.1:8866/api/ocr/bill
paddle_bill_ocr_endpoint =

# OCR 账单识别结果表格列显示设置（true = 隐藏，false = 显示）
# 设置为 true 则在 OCR 结果中隐藏“分类”列
ocr_bill_recognition_hide_category_column = true
# 设置为 true 则在 OCR 结果中隐藏“交易项目”列
ocr_bill_recognition_hide_items_column = true
# 设置为 true 则在 OCR 结果中隐藏“标签”列
ocr_bill_recognition_hide_tags_column = true
# OCR 账单识别弹窗的最大宽度（像素），0 表示使用默认值（例如 1200）
ocr_bill_recognition_dialog_max_width = 0

[llm_image_recognition]
# 图像识别使用的大语言模型提供商，可选："openai"、"openai_compatible"、"anthropic"、"anthropic_compatible"、
# "openrouter"、"ollama"、"lm_studio"、"google_ai"
llm_provider =

# 仅当 llm_provider 为 "openai" 时使用，OpenAI API 密钥（详见 https://platform.openai.com/api-keys）
openai_api_key =

# 仅当 llm_provider 为 "openai" 时使用，用于图像识别创建交易的模型 ID
openai_model_id =

# 仅当 llm_provider 为 "openai_compatible" 时使用，OpenAI 兼容 API 的 Base URL，例如 "https://api.openai.com/v1/"
openai_compatible_base_url =

# 仅当 llm_provider 为 "openai_compatible" 时使用，OpenAI 兼容 API 的密钥
openai_compatible_api_key =

# 仅当 llm_provider 为 "openai_compatible" 时使用，用于图像识别创建交易的模型 ID
openai_compatible_model_id =

# 仅当 llm_provider 为 "anthropic" 时使用，Anthropic API 密钥（详见 https://platform.claude.com/settings/keys）
anthropic_api_key =

# 仅当 llm_provider 为 "anthropic" 时使用，用于图像识别创建交易的模型 ID
anthropic_model_id =

# 仅当 llm_provider 为 "anthropic" 时使用，图像识别生成的最大 token 数，默认 1024
anthropic_max_tokens = 1024

# 仅当 llm_provider 为 "anthropic_compatible" 时使用，Anthropic 兼容 API 的 Base URL，例如 "https://api.anthropic.com/v1/"
anthropic_compatible_base_url =

# 仅当 llm_provider 为 "anthropic_compatible" 时使用，Anthropic 兼容 API 版本，例如 "2023-06-01"，如服务不要求版本可留空
anthropic_compatible_api_version =

# 仅当 llm_provider 为 "anthropic_compatible" 时使用，Anthropic 兼容 API 的密钥
anthropic_compatible_api_key =

# 仅当 llm_provider 为 "anthropic_compatible" 时使用，用于图像识别创建交易的模型 ID
anthropic_compatible_model_id =

# 仅当 llm_provider 为 "anthropic_compatible" 时使用，图像识别生成的最大 token 数，默认 1024
anthropic_compatible_max_tokens = 1024

# 仅当 llm_provider 为 "openrouter" 时使用，OpenRouter API 密钥（详见 https://openrouter.ai/settings/keys）
openrouter_api_key =

# 仅当 llm_provider 为 "openrouter" 时使用，用于图像识别创建交易的模型 ID
openrouter_model_id =

# 仅当 llm_provider 为 "ollama" 时使用，Ollama 服务地址，例如 "http://127.0.0.1:11434/"
ollama_server_url =

# 仅当 llm_provider 为 "ollama" 时使用，用于图像识别创建交易的模型 ID
ollama_model_id =

# 仅当 llm_provider 为 "lm_studio" 时使用，LM Studio 服务地址，例如 "http://127.0.0.1:1234/"
lm_studio_server_url =

# 仅当 llm_provider 为 "lm_studio" 时使用，LM Studio API Token，如果 LM Studio 未开启鉴权可留空
lm_studio_token =

# 仅当 llm_provider 为 "lm_studio" 时使用，用于图像识别创建交易的模型 ID
lm_studio_model_id =

# 仅当 llm_provider 为 "google_ai" 时使用，Google AI Studio API Key（详见 https://aistudio.google.com/apikey）
google_ai_api_key =

# 仅当 llm_provider 为 "google_ai" 时使用，用于图像识别创建交易的模型 ID
google_ai_model_id =

# 请求大语言模型 API 的超时时间（毫秒，0 - 4294967295），0 表示不限时，默认 60000（60 秒）
request_timeout = 60000

# 调用大语言模型 API 时服务器使用的代理，支持：
# "system"（使用系统代理）、"none"（不使用代理）、或以 "http://"/"https://"/"socks5://" 开头的代理地址
proxy = system

# 是否在请求大语言模型 API 时跳过 TLS 证书校验
skip_tls_verify = false

[uuid]
# UUID 生成器类型，目前仅支持 "internal"
generator_type = internal

# 仅当 UUID 生成器类型为 "internal" 时使用，每个服务器必须设置唯一 ID（0 - 255）
server_id = 0

[duplicate_checker]
# 防重复提交检测器类型，目前仅支持 "in_memory"
checker_type = in_memory

# 仅当 checker_type 为 "in_memory" 时使用，清理过期数据的时间间隔（秒，1 - 4294967295），默认 60 秒
cleanup_interval = 60

# 同一页面内两次提交之间的最小间隔时间（秒，0 - 4294967295）
# 关闭并重新进入编辑页 / 弹窗会视为新会话
# 设置为 0 表示关闭新数据提交的防重复检测，默认 300 秒（5 分钟）
duplicate_submissions_interval = 300

[cron]
# 是否定期清理过期的用户 Token
enable_remove_expired_tokens = true

# 是否根据用户的“计划交易模板”定期生成实际交易
enable_create_scheduled_transaction = true

[backup]
# 是否启用每天的邮件备份功能
enable_email_backup = false

# 接收备份文件的邮箱地址
backup_email =

# 每天执行备份的小时（0 - 23），例如 2 表示每天 02:00
backup_hour = 2

# 每小时执行备份的分钟（0 - 59），例如 30 表示 XX:30
backup_minute = 0

# 自动删除早于 N 天的备份文件（0 表示保留所有备份）
backup_retention_days = 30

[security]
# 用于签名加密的秘钥，首次部署前必须修改为随机值以保证数据安全
secret_key =

# Token 过期时间（秒，60 - 4294967295），默认 2592000（30 天）
token_expired_time = 2592000

# Token 可刷新的最小时间间隔（秒，0 - 4294967295），必须小于 token_expired_time
# 设置为 0 表示每次刷新前端时都刷新 Token，默认 86400（1 天）
token_min_refresh_interval = 86400

# 临时 Token 过期时间（秒，60 - 4294967295），默认 300（5 分钟）
temporary_token_expired_time = 300

# 邮箱验证 Token 过期时间（秒，60 - 4294967295），默认 3600（60 分钟）
email_verify_token_expired_time = 3600

# 重置密码 Token 过期时间（秒，60 - 4294967295），默认 3600（60 分钟）
password_reset_token_expired_time = 3600

# 是否启用 API Token 生成功能
enable_api_token = false

# 每分钟同一 IP 的最大密码 / Token 校验失败次数（0 - 4294967295），0 表示不限制，默认 5
max_failures_per_ip_per_minute = 5

# 每分钟同一用户的最大密码 / Token 校验失败次数（0 - 4294967295），0 表示不限制，默认 5
max_failures_per_user_per_minute = 5

[auth]
# 是否启用内置账号密码登录
enable_internal_auth = true

# 是否启用 OAuth 2.0 登录
enable_oauth2_auth = false

# 仅当使用内置登录时有效，是否启用两步验证（双重认证）
enable_two_factor = true

# 仅当使用内置登录时有效，是否允许用户使用“忘记密码”功能
enable_forget_password = true

# 仅当使用内置登录时有效，是否要求用户必须先验证邮箱才能使用“忘记密码”
forget_password_require_email_verify = false

# 仅当使用 OAuth 2.0 登录时有效，OAuth 2.0 提供方类型，可选："oidc"、"nextcloud"、"gitea"、"github"
oauth2_provider =

# 仅当使用 OAuth 2.0 登录时有效，OAuth 2.0 客户端 ID
oauth2_client_id =

# 仅当使用 OAuth 2.0 登录时有效，OAuth 2.0 客户端密钥
oauth2_client_secret =

# 仅当使用 OAuth 2.0 登录时有效，用户标识字段，可选："email"、"username"，默认 "email"
oauth2_user_identifier = email

# 仅当使用 OAuth 2.0 登录时有效，是否启用 PKCE
oauth2_use_pkce = false

# 仅当使用 OAuth 2.0 登录时有效，当第三方返回的用户尚未在本系统注册时，是否自动创建新用户
#（需同时开启 [user] 段中的 enable_register）
oauth2_auto_register = true

# 仅当使用 OAuth 2.0 登录时有效，OAuth 2.0 状态码过期时间（秒，60 - 4294967295），默认 300（5 分钟）
oauth2_state_expired_time = 300

# 仅当使用 OAuth 2.0 登录时有效，请求 OAuth 2.0 接口的超时时间（毫秒，0 - 4294967295）
# 设置为 0 表示不限时，默认 10000（10 秒）
oauth2_request_timeout = 10000

# 仅当使用 OAuth 2.0 登录时有效，请求 OAuth 2.0 接口时使用的代理
# 支持 "system"（使用系统代理）、"none"（不使用代理）、或以 "http://"/"https://"/"socks5://" 开头的代理地址
oauth2_proxy = system

# 仅当使用 OAuth 2.0 登录时有效，是否跳过 TLS 证书校验
oauth2_skip_tls_verify = false

# 仅当 OAuth2 提供方为 "oidc" 时有效，OIDC 提供方的 Issuer URL
# 需保证该地址下存在 ".well-known/openid-configuration" 路径
oidc_provider_base_url =

# 仅当 OAuth2 提供方为 "oidc" 时有效，是否检查 OIDC 发现文档中的 issuer 与上面的 oidc_provider_base_url 是否一致
oidc_provider_check_issuer_url = true

# 仅当 OAuth2 提供方为 "oidc" 时有效，是否在“使用 Connect ID 登录”按钮中使用自定义显示名称
enable_oidc_display_name = false

# 仅当 OAuth2 提供方为 "oidc" 时有效，自定义显示名称，支持多语言
# 通过在键名后加下划线和语言标签配置不同语言，例如 oidc_custom_display_name_zh_hans 表示简体中文
oidc_custom_display_name =

# 仅当 OAuth2 提供方为 "nextcloud" 时有效，Nextcloud 根地址，例如 "https://cloud.example.org/"
nextcloud_base_url =

# 仅当 OAuth2 提供方为 "gitea" 时有效，Gitea 根地址，例如 "https://git.example.com/"
gitea_base_url =

[user]
# 是否允许用户自助注册账号
enable_register = true

# 是否启用“验证邮箱地址”功能
enable_email_verify = false

# 是否要求用户登录时必须已经验证过邮箱
enable_force_email_verify = false

# 是否允许用户上传交易图片
enable_transaction_picture = true

# 交易图片的最大允许大小（字节，1 - 4294967295）
max_transaction_picture_size = 10485760

# 是否允许使用“计划交易”（定期自动生成交易）
enable_scheduled_transaction = true

# 用户头像提供方式，支持：
# "internal"：使用本系统的对象存储保存用户头像（参见 [storage] 设置），支持用户自行更换头像
# "gravatar"：使用 Gravatar（https://gravatar.com）
# 留空表示关闭头像功能
avatar_provider = internal

# 仅当 avatar_provider 为 "internal" 时有效，用户头像文件最大大小（字节，1 - 4294967295）
max_user_avatar_size = 1048576

# 用户注册后默认启用的功能限制（用英文逗号分隔多个类型），留空表示无限制
# 支持的功能类型：
# 1: 修改密码
# 2: 修改邮箱
# 3: 修改基本信息
# 4: 修改头像
# 5: 退出其他会话
# 6: 启用两步验证
# 7: 关闭两步验证
# 8: 忘记密码
# 9: 导入交易
# 10: 导出交易
# 11: 清空所有数据
# 12: 同步应用设置
# 13: MCP（Model Context Protocol）访问
# 14: 通过 AI 图像识别创建交易
# 15: OAuth 2.0 登录
# 16: 解除第三方登录绑定
# 17: 生成 API Token
default_feature_restrictions = 

[data]
# 是否允许用户导出自己的数据
enable_export = true

# 是否允许用户导入数据
enable_import = true

# 导入文件的最大允许大小（字节，1 - 4294967295）
max_import_file_size = 10485760

[tip]
# 是否在登录页展示自定义提示
enable_tips_in_login_page = false

# 登录页展示的自定义提示内容，支持多语言
# 可在键名后加下划线和语言标签配置不同语言的内容，例如 login_page_tips_content_zh_hans 表示简体中文
login_page_tips_content =

[notification]
# 是否在用户每次注册后，在首页显示自定义通知
enable_notification_after_register = false

# 用户注册后展示的自定义通知内容，支持多语言
# 同样通过在键名后加下划线和语言标签配置不同语言，例如 after_login_notification_content_zh_hans 表示简体中文
after_register_notification_content =

# 是否在用户每次登录后，在首页显示自定义通知
enable_notification_after_login = false

# 用户登录后展示的自定义通知内容，支持多语言
after_login_notification_content =

# 是否在用户每次打开应用时，在首页显示自定义通知
enable_notification_after_open = false

# 用户打开应用时展示的自定义通知内容，支持多语言
after_open_notification_content =

[map]
# 地图服务提供方，支持：
# "openstreetmap": https://www.openstreetmap.org
# "openstreetmap_humanitarian": http://map.hotosm.org
# "opentopomap": https://opentopomap.org
# "opnvkarte": https://publictransportmap.org
# "cyclosm": https://www.cyclosm.org
# "cartodb": https://carto.com/basemaps
# "tomtom": https://www.tomtom.com
# "tianditu": https://www.tianditu.gov.cn
# "googlemap": https://map.google.com
# "baidumap": https://map.baidu.com
# "amap": https://amap.com
# "custom": 自定义瓦片地图服务地址
# 留空表示禁用地图功能
map_provider = openstreetmap

# 是否由 ezBookkeeping 服务器代理转发地图数据请求
# 对以下地图类型有效："openstreetmap"、"openstreetmap_humanitarian"、"opentopomap"、
# "opnvkarte"、"cyclosm"、"cartodb"、"tomtom"、"tianditu"、"custom"
map_data_fetch_proxy = false

# 当 map_data_fetch_proxy 为 true 时，请求原始地图数据时使用的代理
# 支持 "system"（使用系统代理）、"none"（不使用代理）、或以 "http://"/"https://"/"socks5://" 开头的代理地址
proxy = system

# 仅当 map_provider 为 "tomtom" 时使用，TomTom 地图 API Key（详见 https://developer.tomtom.com/how-to-get-tomtom-api-key）
tomtom_map_api_key =

# 仅当 map_provider 为 "tianditu" 时使用，天地图应用 Key（详见 https://console.tianditu.gov.cn/api/register）
tianditu_map_app_key =

# 仅当 map_provider 为 "googlemap" 时使用，Google 地图 JavaScript API Key（详见 https://developers.google.com/maps/get-started）
google_map_api_key =

# 仅当 map_provider 为 "baidumap" 时使用，百度地图 JavaScript API 应用 AK（详见 https://lbsyun.baidu.com）
baidu_map_ak =

# 仅当 map_provider 为 "amap" 时使用，高德地图 JavaScript API 应用 Key（详见 https://lbs.amap.com/api/javascript-api/guide/abc/prepare）
amap_application_key =

# 仅当 map_provider 为 "amap" 时使用，高德地图 JavaScript API 安全校验方式，可选：
# "internal_proxy"：使用内部代理携带应用密钥请求高德 API（默认）
# "external_proxy"：通过外部代理请求高德 API（应用密钥由代理处理）
# "plain_text"：前端请求中直接携带应用密钥（公网环境下不安全）
# 详见：https://developer.amap.com/api/jsapi-v2/guide/abc/load
amap_security_verification_method = internal_proxy

# 仅当 map_provider 为 "amap" 且 security_verification_method 为 "internal_proxy" 或 "plain_text" 时使用
# 高德地图 JavaScript API 应用 Secret（详见 https://lbs.amap.com/api/javascript-api/guide/abc/prepare）
amap_application_secret =

# 仅当 map_provider 为 "amap" 且 security_verification_method 为 "external_proxy" 时使用
# 高德地图 JavaScript API 外部代理地址
amap_api_external_proxy_url =

# 仅当 map_provider 为 "custom" 时使用，自定义瓦片服务器的图层 URL
# 支持 {x}、{y}（坐标）和 {z}（缩放级别）占位符，例如 "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
custom_map_tile_server_url =

# 仅当 map_provider 为 "custom" 时使用，自定义瓦片服务器的可选文字标注图层 URL
# 同样支持 {x}、{y}、{z} 占位符
custom_map_tile_server_annotation_url =

# 仅当 map_provider 为 "custom" 时使用，自定义瓦片服务器的最小缩放级别（0 - 255），默认 1
custom_map_tile_server_min_zoom_level = 1

# 仅当 map_provider 为 "custom" 时使用，自定义瓦片服务器的最大缩放级别（0 - 255），默认 18
custom_map_tile_server_max_zoom_level = 18

# 仅当 map_provider 为 "custom" 时使用，自定义瓦片服务器的默认缩放级别（0 - 255），默认 14
custom_map_tile_server_default_zoom_level = 14

[exchange_rates]
# 汇率数据来源，支持以下类型：
# "reserve_bank_of_australia": 澳大利亚储备银行
# "bank_of_canada": 加拿大央行
# "czech_national_bank": 捷克国家银行
# "danmarks_national_bank": 丹麦国家银行
# "euro_central_bank": 欧洲央行
# "national_bank_of_georgia": 格鲁吉亚国家银行
# "central_bank_of_hungary": 匈牙利央行
# "bank_of_israel": 以色列央行
# "central_bank_of_myanmar": 缅甸央行
# "norges_bank": 挪威央行
# "national_bank_of_poland": 波兰国家银行
# "national_bank_of_romania": 罗马尼亚国家银行
# "bank_of_russia": 俄罗斯央行
# "swiss_national_bank": 瑞士国家银行
# "national_bank_of_ukraine": 乌克兰国家银行
# "central_bank_of_uzbekistan": 乌兹别克斯坦央行
# "user_custom": 由用户在界面中自定义汇率
data_source = euro_central_bank

# 请求汇率数据的超时时间（毫秒，0 - 4294967295）
# 设置为 0 表示不限时，默认 10000（10 秒）
request_timeout = 10000

# 请求汇率数据时使用的代理，支持 "system"（使用系统代理）、"none"（不使用代理）、或以 "http://"/"https://"/"socks5://" 开头的代理地址
proxy = system

# 是否在请求汇率数据时跳过 TLS 证书校验
skip_tls_verify = false
